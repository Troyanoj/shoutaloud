name: Smart Contracts CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/blockchain/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/blockchain/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/blockchain/package-lock.json
      - name: Install dependencies
        run: |
          cd packages/blockchain
          npm ci
      - name: Compile contracts
        run: |
          cd packages/blockchain
          npx hardhat compile
      - name: Run tests
        run: |
          cd packages/blockchain
          npx hardhat test

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/blockchain/package-lock.json
      - name: Install dependencies
        run: |
          cd packages/blockchain
          npm ci
      - name: Run coverage
        run: |
          cd packages/blockchain
          npx hardhat coverage
