name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'platform/backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'platform/backend/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd platform/backend
          pip install -r requirements.txt
          pip install black isort flake8
      - name: Run linters
        run: |
          cd platform/backend
          black --check .
          isort --check .
          flake8 .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: shoutaloud
          POSTGRES_PASSWORD: shoutaloud_password
          POSTGRES_DB: shoutaloud_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd platform/backend
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        env:
          DATABASE_URL: postgresql://shoutaloud:shoutaloud_password@localhost:5432/shoutaloud_test
        run: |
          cd platform/backend
          pytest tests/ -v --cov=. --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: platform/backend/coverage.xml

  deploy:
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: echo "Deploy step - configure your hosting provider"
