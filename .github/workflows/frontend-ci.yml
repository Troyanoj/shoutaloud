name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'platform/frontend/web/**'
  pull_request:
    branches: [main]
    paths:
      - 'platform/frontend/web/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: platform/frontend/web/package-lock.json
      - name: Install dependencies
        run: |
          cd platform/frontend/web
          npm ci
      - name: Run linter
        run: |
          cd platform/frontend/web
          npm run lint

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: platform/frontend/web/package-lock.json
      - name: Install dependencies
        run: |
          cd platform/frontend/web
          npm ci
      - name: Build
        run: |
          cd platform/frontend/web
          npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: platform/frontend/web/package-lock.json
      - name: Install dependencies
        run: |
          cd platform/frontend/web
          npm ci
      - name: Build
        run: |
          cd platform/frontend/web
          npm run build
      - name: Deploy to Vercel
        run: echo "Deploy to Vercel - configure VERCEL_TOKEN in secrets"
