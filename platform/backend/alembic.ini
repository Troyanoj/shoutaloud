[alembic]
script_location = alembic
sqlalchemy.url = postgresql://neondb_owner:npg_zfmyLRAMo1k7@ep-fragrant-haze-amhqjay1-pooler.c-5.us-east-1.aws.neon.tech/neondb?channel_binding=require&sslmode=require

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
